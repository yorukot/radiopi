capture:
  uri: "auto"
  freq_hz: 430230000
  sample_rate: 1008000
  quad_rate: 240000
  audio_rate: 16000
  buffer_size: 262144
  rf_squelch_db: -30.0
  rf_squelch_alpha: 0.001
  fm_squelch_threshold: -1.0
  audio_hpf_cutoff: 350.0
  ctcss_freq: 0.0
  ctcss_q: 30.0
  audio_gain: 0.7

segment:
  stream_id: "pluto430230"
  start_threshold: 0.02
  stop_threshold: 0.01
  min_silence_ms: 1200
  min_segment_ms: 500
  max_segment_sec: 300

spool:
  root_dir: "./spool"
  keep_acked: true
  scan_interval_sec: 2.0

upload:
  base_url: "http://127.0.0.1:8080"
  api_key: "replace-me"
  timeout_sec: 30.0
  initial_backoff_sec: 2.0
  max_backoff_sec: 60.0

runtime:
  runtime_dir: "./runtime"
  health_path: "./runtime/edge-status.json"
  fifo_name: "capture.pcm"
  status_interval_sec: 5.0
