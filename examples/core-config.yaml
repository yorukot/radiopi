api:
  host: "0.0.0.0"
  port: 8080
  api_key: "replace-me"

database:
  path: "./db.sqlite3"

data:
  root_dir: "./data"
  raw_dir: "./data/raw"
  raw_asr_dir: "./data/raw_asr"
  transcripts_dir: "./data/transcripts"
  archives_dir: "./data/archives"
  telegram_dir: "./data/telegram"
  worker_health_path: "./data/worker-status.json"

asr:
  model: "turbo"
  device: "cuda"
  compute_type: "float16"
  language: null
  beam_size: 5
  vad_filter: false
  condition_on_previous_text: false
  poll_interval_sec: 2.0
  close_grace_sec: 30
  window_sec: 600

telegram:
  enabled: false
  bot_token: ""
  chat_id: ""
  send_audio: false
  timeout_sec: 30.0
