api:
  host: "0.0.0.0"
  port: 8080
  api_key: "replace-me"

database:
  path: "./db.sqlite3"

data:
  root_dir: "./data"
  raw_dir: "./data/raw"
  raw_asr_dir: "./data/raw_asr"
  transcripts_dir: "./data/transcripts"
  archives_dir: "./data/archives"
  worker_health_path: "./data/worker-status.json"

asr:
  model: "turbo"
  device: "cuda"
  compute_type: "float16"
  language: "zh"
  opencc_config: "s2t"
  beam_size: 5
  vad_filter: false
  condition_on_previous_text: false
  poll_interval_sec: 2.0
  close_grace_sec: 30
  window_sec: 600

telegram:
  enabled: false
  bot_token: ""
  chat_id: ""
  timeout_sec: 30.0
  default_message_thread_id: null
  stream_topics:
    CPR-01: 101
    CPR-02: 102
    CPR-03: 103
    CPR-04: 104
    CPR-05: 105
    CPR-06: 106
    CPR-07: 107
    CPR-08: 108
    CPR-09: 109
    CPR-10: 110
    CPR-11: 111
    CPR-12: 112
    CPR-13: 113
    CPR-14: 114
    CPR-15: 115
    CPR-16: 116
